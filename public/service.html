<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Room Service — Dashboard</title>
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:      #fbf9f5;
      --surface: #f5f3ef;
      --card:    #ffffff;
      --border:  rgba(0,0,0,0.06);
      --accent:  #755a26;
      --accent2: #af8f55;
      --text:    #1c140e;
      --muted:   #4d463a;
      --radius:  14px;
    }
    html, body { height:100%; background:var(--bg); font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; color:var(--text); -webkit-tap-highlight-color:transparent; }

    /* ── HEADER ── */
    header {
      position:sticky; top:0; z-index:10;
      background: rgba(251,249,245,0.82);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom:1px solid var(--border);
      padding:14px 20px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .header-left h1 {
      font-family:'Cormorant Garamond', Georgia, serif;
      font-size:18px; font-weight:700; letter-spacing:-.2px;
    }
    .header-left span { font-size:11px; color:var(--muted); letter-spacing:.5px; display:block; margin-top:2px; }
    .header-right { display:flex; align-items:center; gap:10px; }

    #badge {
      background: linear-gradient(135deg, #755a26, #af8f55);
      color:#fff; font-family:'Cormorant Garamond', Georgia, serif;
      font-size:13px; font-weight:700;
      min-width:28px; height:28px; border-radius:6px; padding:0 8px;
      display:none; align-items:center; justify-content:center;
    }
    #badge.visible { display:flex; }
    #badge.bump { animation:bump .3s ease; }
    @keyframes bump { 0%,100%{transform:scale(1);} 50%{transform:scale(1.4);} }

    .icon-btn {
      width:38px; height:38px; border-radius:50%;
      background:var(--card); border:none; color:var(--text); font-size:15px;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      box-shadow:0 1px 4px rgba(0,0,0,.08); transition:opacity .12s;
    }
    .icon-btn:active { opacity:.6; }

    .conn-dot {
      width:8px; height:8px; border-radius:50%;
      background:var(--muted); opacity:.4;
      flex-shrink:0; transition:background .4s, opacity .4s;
    }
    .conn-dot.ok  { background:var(--accent); opacity:1; }
    .conn-dot.err { background:#c0392b; opacity:1; }

    /* ── NOTIF BANNER ── */
    #notif-banner {
      background:rgba(117,90,38,.06); border-bottom:1px solid rgba(117,90,38,.12);
      padding:10px 20px; display:none; align-items:center;
      justify-content:space-between; gap:12px; font-size:13px; color:var(--muted);
    }
    #notif-banner.visible { display:flex; }
    #notif-banner button {
      background:linear-gradient(135deg,#755a26,#af8f55); color:#fff;
      border:none; border-radius:6px; padding:8px 16px; font-size:12px; font-weight:600; cursor:pointer;
    }

    /* ── MAIN ── */
    main { padding:20px 16px 60px; max-width:820px; margin:0 auto; }

    /* Empty state */
    #empty {
      text-align:center; padding:80px 24px;
      display:flex; flex-direction:column; align-items:center; gap:16px;
    }
    #empty img { width:100px; opacity:.55; }
    #empty p {
      font-family:'Cormorant Garamond', Georgia, serif;
      font-size:17px; font-weight:600; color:var(--muted);
    }

    #order-list { display:flex; flex-direction:column; gap:12px; }

    /* ── ORDER CARD ── */
    .order-card {
      background:var(--card); border-radius:var(--radius);
      padding:20px; display:flex; align-items:flex-start; gap:16px;
      animation:slideIn .3s cubic-bezier(.25,.8,.25,1);
      transition:opacity .25s, transform .25s;
      box-shadow:0 2px 20px rgba(0,0,0,.06);
    }
    .order-card.housekeeper-request {
      background:
        radial-gradient(circle at top left, rgba(194,77,61,.18), transparent 45%),
        linear-gradient(135deg, #fff7f4, #fff1ec);
      border: 1px solid rgba(194,77,61,.18);
      box-shadow: 0 12px 28px rgba(194,77,61,.14);
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-12px) scale(.97);} to{opacity:1;transform:none;} }
    .order-card.removing { opacity:0; transform:scale(.95); pointer-events:none; }

    .drink-icon { font-size:36px; flex-shrink:0; padding-top:2px; }
    .order-info { flex:1; min-width:0; }
    .order-room {
      font-size:10px; font-weight:600; letter-spacing:1.2px;
      text-transform:uppercase; color:var(--accent); margin-bottom:4px;
    }
    .order-drink {
      font-family:'Cormorant Garamond', Georgia, serif;
      font-size:16px; font-weight:700; color:var(--text); line-height:1.3;
    }
    .order-note {
      font-family:'Cormorant Garamond', Georgia, serif;
      font-size:13px; font-style:italic; color:var(--muted); margin-top:3px;
    }
    .order-time { font-size:12px; color:var(--muted); margin-top:4px; letter-spacing:.3px; }
    .order-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      background: rgba(194,77,61,.12);
      color: #8d1f1f;
    }

    .ready-btn {
      background:linear-gradient(135deg,#755a26,#af8f55); color:#fff; border:none;
      border-radius:6px; padding:11px 18px;
      font-size:14px; font-weight:700; cursor:pointer;
      white-space:nowrap; flex-shrink:0; margin-top:2px;
      transition:transform .1s;
    }
    .order-card.housekeeper-request .ready-btn {
      background: linear-gradient(135deg, #8d1f1f, #c24d3d);
    }
    .ready-btn:active { transform:scale(.93); }

    /* ── SETTINGS OVERLAY ── */
    #settings-overlay {
      display:none; position:fixed; inset:0;
      background:var(--bg); z-index:200;
      flex-direction:column; overflow-y:auto;
    }
    #settings-overlay.open { display:flex; }

    .settings-header {
      position:sticky; top:0;
      background:rgba(251,249,245,0.82);
      backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
      border-bottom:1px solid var(--border);
      padding:14px 20px; display:flex; align-items:center; justify-content:space-between; z-index:10;
    }
    .settings-header .btn-cancel {
      background:none; border:none; font-size:14px; color:var(--muted); cursor:pointer;
    }
    .settings-header h2 {
      font-family:'Cormorant Garamond', Georgia, serif;
      font-size:16px; font-weight:700; color:var(--text);
    }
    .settings-header .btn-save {
      background:none; border:none;
      font-size:14px; font-weight:700; color:var(--accent); cursor:pointer;
    }

    .settings-body { padding:24px 16px 16px; max-width:600px; width:100%; margin:0 auto; display:flex; flex-direction:column; gap:28px; }

    .settings-section-title {
      font-size:10px; font-weight:600; letter-spacing:1.5px;
      text-transform:uppercase; color:var(--muted);
      padding:0 4px; margin-bottom:10px;
    }

    .settings-list {
      background:var(--card); border-radius:var(--radius);
      overflow:hidden; margin-bottom:10px;
      box-shadow:0 2px 16px rgba(0,0,0,.04);
    }
    .settings-item {
      background:var(--card); padding:14px 16px;
      display:flex; align-items:center; gap:12px;
      border-bottom:1px solid var(--border);
    }
    .settings-item:last-child { border-bottom:none; }
    .settings-item-label { flex:1; font-size:15px; font-weight:500; color:var(--text); }

    /* Availability pill */
    .avail-toggle {
      font-size:11px; font-weight:600; letter-spacing:.4px;
      padding:5px 10px; border:none; border-radius:4px; cursor:pointer;
      flex-shrink:0;
    }
    .avail-toggle.available   { background:rgba(117,90,38,.1); color:var(--accent); }
    .avail-toggle.unavailable { background:var(--surface);     color:var(--muted);  }

    .del-btn {
      width:28px; height:28px; border-radius:50%;
      background:#fff0f0; border:1.5px solid #ffcdd2;
      color:#c0392b; font-size:18px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0; line-height:1;
    }
    .del-btn:active { background:#ffcdd2; }

    .drag-handle { cursor:grab; color:var(--muted); font-size:18px; padding:0 4px 0 0; touch-action:none; user-select:none; flex-shrink:0; }
    .drag-handle:active { cursor:grabbing; }
    .settings-item.dragging { opacity:.2; }
    .drag-placeholder { border:2px dashed var(--accent); border-radius:10px; background:rgba(117,90,38,.04); }

    /* Add form */
    .add-form { display:flex; gap:8px; align-items:center; position:relative; }
    .icon-input {
      width:52px; border-radius:10px; padding:13px 8px; font-size:20px; text-align:center;
      background:var(--card); border:1px solid var(--border); color:var(--text); outline:none; cursor:pointer;
    }
    .icon-input:focus { border-color:var(--accent); }
    .label-input {
      flex:1; border-radius:10px; padding:13px 14px; font-size:15px;
      background:var(--card); border:1px solid var(--border); color:var(--text); outline:none;
    }
    .label-input:focus { border-color:var(--accent); }
    .label-input::placeholder { color:var(--muted); }
    .add-btn {
      background:linear-gradient(135deg,#755a26,#af8f55); color:#fff;
      border:none; border-radius:10px; padding:13px 16px;
      font-size:22px; font-weight:800; cursor:pointer; flex-shrink:0;
    }
    .add-btn:active { opacity:.8; }

    /* Emoji picker */
    .emoji-picker {
      position:absolute; bottom:calc(100% + 8px); left:0;
      background:var(--card); border:1px solid var(--border); border-radius:14px;
      padding:10px; display:none; flex-wrap:wrap; gap:4px; width:264px;
      z-index:400; box-shadow:0 8px 28px rgba(0,0,0,.12);
    }
    .emoji-picker.open { display:flex; }
    .emoji-opt { font-size:26px; width:38px; height:38px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; border:none; background:none; }
    .emoji-opt:active { background:var(--surface); }

    /* Project name input in settings */
    .project-name-input {
      width:100%; background:none; border:none; outline:none;
      font-family:'Cormorant Garamond', Georgia, serif;
      font-size:17px; font-weight:600; color:var(--text);
      border-bottom:1px solid rgba(117,90,38,.25);
      padding:12px 20px;
    }
    .project-name-input::placeholder { color:var(--muted); opacity:.6; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Room Service</h1>
    <span>Service Dashboard</span>
  </div>
  <div class="header-right">
    <div id="badge">0</div>
    <a href="/" class="icon-btn" title="Home">🏠</a>
    <button id="settings-btn" class="icon-btn">⚙️</button>
    <div class="conn-dot" id="conn-dot"></div>
  </div>
</header>

<div id="notif-banner">
  <span>Enable notifications for new orders</span>
  <button id="notif-btn">Enable</button>
</div>

<main>
  <div id="empty">
    <img src="/images/bell-gold.png" alt="">
    <p>Waiting for orders…</p>
  </div>
  <div id="order-list"></div>
</main>

<div id="settings-overlay">
  <div class="settings-header">
    <button class="btn-cancel" id="settings-cancel">Cancel</button>
    <h2>Settings</h2>
    <button class="btn-save" id="save-settings">Save</button>
  </div>
  <div class="settings-body">

    <!-- Project name -->
    <div class="settings-section">
      <p class="settings-section-title">Property Name</p>
      <div class="settings-list">
        <input class="project-name-input" id="settings-project-name" placeholder="Property name">
      </div>
    </div>

    <!-- Rooms -->
    <div class="settings-section">
      <p class="settings-section-title">Rooms / Tables</p>
      <div class="settings-list" id="settings-rooms"></div>
      <div class="add-form">
        <input class="icon-input" id="new-room-icon" placeholder="🛏️" maxlength="4" readonly>
        <div class="emoji-picker" id="room-emoji-picker"></div>
        <input class="label-input" id="new-room-label" placeholder="Room name">
        <button class="add-btn" id="add-room-btn">+</button>
      </div>
    </div>

    <!-- Drinks -->
    <div class="settings-section">
      <p class="settings-section-title">Drinks</p>
      <div class="settings-list" id="settings-drinks"></div>
      <div class="add-form">
        <input class="icon-input" id="new-drink-icon" placeholder="☕" maxlength="4" readonly>
        <div class="emoji-picker" id="drink-emoji-picker"></div>
        <input class="label-input" id="new-drink-label" placeholder="Drink name">
        <button class="add-btn" id="add-drink-btn">+</button>
      </div>
    </div>

  </div>
</div>

<script>
'use strict';

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const ROOM_EMOJIS  = ['🛏️','👑','🖥️','🍽️','🛋️','🏋️','🏊','🧘','🍳','🛁','🎮','📚','🎬','🌿','🏡','💪','🎨','🎵','☀️','🌙','🚿','🏠','🪴','🏖️'];
const DRINK_EMOJIS = ['☕','🍵','🥛','🍫','💧','🧃','🍷','🥤','🧋','🫖','🍶','🧊','🥂','🍹','🫗','🍺','🍌','🍓','🫐'];

const DEFAULT_CONFIG = {
  projectName: '18 Elysée',
  rooms: [
    { id:'master',   icon:'👑',  label:'Master Suite',  available:true },
    { id:'chambre4', icon:'🛏️', label:'Bedroom 4',      available:true },
    { id:'chambre3', icon:'🛏️', label:'Bedroom 3',      available:true },
    { id:'chambre2', icon:'🛏️', label:'Bedroom 2',      available:true },
    { id:'chambre1', icon:'🛏️', label:'Bedroom 1',      available:true },
    { id:'office1',  icon:'🖥️', label:'Office 1',       available:true },
    { id:'office2',  icon:'🖥️', label:'Office 2',       available:true },
    { id:'dining',   icon:'🍽️', label:'Dining Room',    available:true },
    { id:'salon',    icon:'🛋️', label:'Living Room',    available:true },
    { id:'kitchen',  icon:'🍳',  label:'Kitchen',        available:true },
    { id:'wellness', icon:'🧘',  label:'Wellness',       available:true },
    { id:'gym',      icon:'🏋️', label:'Gym',            available:true },
    { id:'pool',     icon:'🏊',  label:'Swimming Pool',  available:true },
  ],
  drinks: [
    { id:'espresso',   icon:'☕', label:'Espresso',      available:true },
    { id:'flat-white', icon:'☕', label:'Flat White',    available:true },
    { id:'cappuccino', icon:'🥛', label:'Cappuccino',    available:true },
    { id:'black-tea',  icon:'🍵', label:'Black Tea',     available:true },
    { id:'green-tea',  icon:'🍵', label:'Green Tea',     available:true },
    { id:'hot-choc',   icon:'🍫', label:'Hot Chocolate', available:true },
    { id:'water',      icon:'💧', label:'Still Water',   available:true },
    { id:'oj',         icon:'🧃', label:'Orange Juice',  available:true },
  ]
};

function loadConfig() {
  try { const s = localStorage.getItem('rs_config'); if (s) return { ...DEFAULT_CONFIG, ...JSON.parse(s) }; } catch {}
  return { ...DEFAULT_CONFIG };
}
function saveConfig(cfg) { localStorage.setItem('rs_config', JSON.stringify(cfg)); }

let config = loadConfig();
let editRooms = [], editDrinks = [], editProjectName = '';

/* ── Emoji picker ── */
function buildPicker(el, emojis, input) {
  el.innerHTML = '';
  emojis.forEach(e => {
    const btn = document.createElement('button'); btn.className='emoji-opt'; btn.type='button'; btn.textContent=e;
    btn.addEventListener('click', ev => { ev.stopPropagation(); input.value=e; el.classList.remove('open'); });
    el.appendChild(btn);
  });
}
const roomIconInput  = document.getElementById('new-room-icon');
const drinkIconInput = document.getElementById('new-drink-icon');
const roomPicker     = document.getElementById('room-emoji-picker');
const drinkPicker    = document.getElementById('drink-emoji-picker');
buildPicker(roomPicker,  ROOM_EMOJIS,  roomIconInput);
buildPicker(drinkPicker, DRINK_EMOJIS, drinkIconInput);
roomIconInput.addEventListener('click',  e => { e.stopPropagation(); drinkPicker.classList.remove('open'); roomPicker.classList.toggle('open'); });
drinkIconInput.addEventListener('click', e => { e.stopPropagation(); roomPicker.classList.remove('open'); drinkPicker.classList.toggle('open'); });
document.addEventListener('click', () => { roomPicker.classList.remove('open'); drinkPicker.classList.remove('open'); });

/* ── Settings render ── */
const settingsOverlay = document.getElementById('settings-overlay');

function renderSettingsRooms() {
  const list = document.getElementById('settings-rooms'); list.innerHTML='';
  editRooms.forEach((r,i) => {
    const item = document.createElement('div'); item.className='settings-item'; item.dataset.index=i;
    const avail = r.available !== false;
    item.innerHTML=`
      <span class="drag-handle">⠿</span>
      <span class="settings-item-label">${escHtml(r.icon)} ${escHtml(r.label)}</span>
      <button class="avail-toggle ${avail?'available':'unavailable'}" data-i="${i}">${avail?'Available':'Unavailable'}</button>
      <button class="del-btn" data-i="${i}">−</button>
    `;
    list.appendChild(item);
  });
}
function renderSettingsDrinks() {
  const list = document.getElementById('settings-drinks'); list.innerHTML='';
  editDrinks.forEach((d,i) => {
    const item = document.createElement('div'); item.className='settings-item'; item.dataset.index=i;
    const avail = d.available !== false;
    item.innerHTML=`
      <span class="drag-handle">⠿</span>
      <span class="settings-item-label">${escHtml(d.icon)} ${escHtml(d.label)}</span>
      <button class="avail-toggle ${avail?'available':'unavailable'}" data-i="${i}">${avail?'Available':'Unavailable'}</button>
      <button class="del-btn" data-i="${i}">−</button>
    `;
    list.appendChild(item);
  });
}

document.getElementById('settings-rooms').addEventListener('click', e => {
  const del = e.target.closest('.del-btn');
  if (del) { editRooms.splice(+del.dataset.i,1); renderSettingsRooms(); return; }
  const tog = e.target.closest('.avail-toggle');
  if (tog) { editRooms[+tog.dataset.i].available = !editRooms[+tog.dataset.i].available; renderSettingsRooms(); }
});
document.getElementById('settings-drinks').addEventListener('click', e => {
  const del = e.target.closest('.del-btn');
  if (del) { editDrinks.splice(+del.dataset.i,1); renderSettingsDrinks(); return; }
  const tog = e.target.closest('.avail-toggle');
  if (tog) { editDrinks[+tog.dataset.i].available = !editDrinks[+tog.dataset.i].available; renderSettingsDrinks(); }
});

function makeSortable(listEl, getArr, renderFn) {
  let src=null, ghost=null, ph=null, srcY=0;
  listEl.addEventListener('mousedown', start); listEl.addEventListener('touchstart', start,{passive:false});
  function start(e) {
    if (!e.target.closest('.drag-handle')) return;
    const item=e.target.closest('.settings-item'); if (!item) return;
    e.preventDefault(); src=item;
    const rect=item.getBoundingClientRect(); srcY=getY(e)-rect.top;
    ph=document.createElement('div'); ph.className='drag-placeholder'; ph.style.height=rect.height+'px';
    item.after(ph); item.classList.add('dragging');
    ghost=item.cloneNode(true);
    Object.assign(ghost.style,{position:'fixed',left:rect.left+'px',top:rect.top+'px',width:rect.width+'px',pointerEvents:'none',zIndex:'999',opacity:'0.9',background:'var(--card)',border:'1.5px solid var(--accent)',borderRadius:'10px',padding:'14px 16px',display:'flex',alignItems:'center',gap:'12px',boxShadow:'0 8px 24px rgba(0,0,0,.12)'});
    document.body.appendChild(ghost);
    document.addEventListener('mousemove',move); document.addEventListener('touchmove',move,{passive:false});
    document.addEventListener('mouseup',end);   document.addEventListener('touchend',end);
  }
  function move(e) {
    e.preventDefault(); const y=getY(e); ghost.style.top=(y-srcY)+'px';
    ghost.style.visibility='hidden'; const hit=document.elementFromPoint(parseFloat(ghost.style.left)+20,y); ghost.style.visibility='';
    const tgt=hit?.closest('.settings-item:not(.dragging)');
    if (tgt&&tgt.parentNode===listEl) { const mid=tgt.getBoundingClientRect().top+tgt.offsetHeight/2; listEl.insertBefore(ph,y<mid?tgt:tgt.nextSibling); }
  }
  function end() {
    if (!src) return;
    listEl.insertBefore(src,ph); ph.remove(); ghost.remove(); src.classList.remove('dragging');
    const arr=getArr(), items=[...listEl.querySelectorAll('.settings-item')];
    const newArr=items.map(el=>arr[+el.dataset.index]);
    arr.splice(0,arr.length,...newArr);
    renderFn(); src=ghost=ph=null;
    document.removeEventListener('mousemove',move); document.removeEventListener('touchmove',move);
    document.removeEventListener('mouseup',end);   document.removeEventListener('touchend',end);
  }
  function getY(e){return(e.touches?.[0]||e.changedTouches?.[0]||e).clientY;}
}
makeSortable(document.getElementById('settings-rooms'),  ()=>editRooms,  renderSettingsRooms);
makeSortable(document.getElementById('settings-drinks'), ()=>editDrinks, renderSettingsDrinks);

document.getElementById('settings-btn').addEventListener('click', () => {
  editRooms=JSON.parse(JSON.stringify(config.rooms));
  editDrinks=JSON.parse(JSON.stringify(config.drinks));
  editProjectName=config.projectName||'';
  document.getElementById('settings-project-name').value=editProjectName;
  renderSettingsRooms(); renderSettingsDrinks();
  settingsOverlay.classList.add('open');
});
document.getElementById('settings-cancel').addEventListener('click', () => settingsOverlay.classList.remove('open'));

document.getElementById('add-room-btn').addEventListener('click', () => {
  const icon=roomIconInput.value.trim()||'🛏️';
  const label=document.getElementById('new-room-label').value.trim(); if(!label) return;
  editRooms.push({id:'r'+Date.now(),icon,label,available:true});
  roomIconInput.value=''; document.getElementById('new-room-label').value='';
  renderSettingsRooms();
});
document.getElementById('add-drink-btn').addEventListener('click', () => {
  const icon=drinkIconInput.value.trim()||'☕';
  const label=document.getElementById('new-drink-label').value.trim(); if(!label) return;
  editDrinks.push({id:'d'+Date.now(),icon,label,available:true});
  drinkIconInput.value=''; document.getElementById('new-drink-label').value='';
  renderSettingsDrinks();
});

document.getElementById('save-settings').addEventListener('click', () => {
  const projectName = document.getElementById('settings-project-name').value.trim() || config.projectName;
  config = { projectName, rooms:editRooms, drinks:editDrinks };
  saveConfig(config);
  if (ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'update_config',config}));
  settingsOverlay.classList.remove('open');
});

/* ── Audio ── */
let audioCtx=null;
document.addEventListener('click',()=>{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();},{once:true});
async function playBeep(){
  if(!audioCtx)return; if(audioCtx.state==='suspended')await audioCtx.resume();
  [{freq:880,delay:0},{freq:1100,delay:220}].forEach(({freq,delay})=>{
    setTimeout(()=>{
      const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
      osc.connect(gain);gain.connect(audioCtx.destination);
      osc.frequency.value=freq;osc.type='sine';
      gain.gain.setValueAtTime(0.35,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.55);
      osc.start(audioCtx.currentTime);osc.stop(audioCtx.currentTime+0.55);
    },delay);
  });
}

/* ── Notifications ── */
const notifBanner=document.getElementById('notif-banner');
function checkNotif(){if(!('Notification'in window))return;if(Notification.permission==='default')notifBanner.classList.add('visible');}
document.getElementById('notif-btn').addEventListener('click',()=>{Notification.requestPermission().then(p=>{if(p!=='default')notifBanner.classList.remove('visible');});});
function sendNotif(o){if(!('Notification'in window)||Notification.permission!=='granted')return;new Notification(`New order — ${o.name}`,{body:o.drink,tag:`order-${o.id}`});}

/* ── Orders ── */
const badge=document.getElementById('badge'),empty=document.getElementById('empty');
const orderList=document.getElementById('order-list'),connDot=document.getElementById('conn-dot');
const ordersMap=new Map();

function emojiFor(drink){const d=config.drinks.find(x=>drink.includes(x.label));return d?d.icon:'☕';}
function updateBadge(){
  const n=ordersMap.size;
  badge.textContent=n; badge.classList.toggle('visible',n>0);
  badge.classList.remove('bump'); void badge.offsetWidth; badge.classList.add('bump');
  empty.style.display=n===0?'':'none';
}
function timeLabel(ts){const s=Math.round((Date.now()-ts)/1000);return s<60?`${s}s ago`:`${Math.round(s/60)}min ago`;}

function addOrder(order) {
  if(ordersMap.has(order.id))return;
  const isHousekeeperRequest = order.kind === 'housekeeper_request';
  const card=document.createElement('div'); card.className=`order-card${isHousekeeperRequest ? ' housekeeper-request' : ''}`;
  const noteHtml = order.note ? `<div class="order-note">${escHtml(order.note)}</div>` : '';
  const pillHtml = isHousekeeperRequest ? '<div class="order-pill">Intendante demandée</div>' : '';
  card.innerHTML=`
    <span class="drink-icon">${isHousekeeperRequest ? '🔔' : emojiFor(order.drink)}</span>
    <div class="order-info">
      <div class="order-room">${escHtml(order.name)}</div>
      ${pillHtml}
      <div class="order-drink">${escHtml(order.drink)}</div>
      ${noteHtml}
      <div class="order-time" data-ts="${order.at}">${timeLabel(order.at)}</div>
    </div>
    <button class="ready-btn">${isHousekeeperRequest ? 'Pris en charge' : 'Ready ✓'}</button>
  `;
  card.querySelector('.ready-btn').addEventListener('click',()=>markReady(order.id));
  orderList.prepend(card); ordersMap.set(order.id,card); updateBadge();
}
function removeOrder(id){
  const card=ordersMap.get(id);if(!card)return;
  card.classList.add('removing');
  setTimeout(()=>{card.remove();ordersMap.delete(id);updateBadge();},250);
}
function markReady(id){if(!ws||ws.readyState!==WebSocket.OPEN)return;ws.send(JSON.stringify({type:'ready',orderId:id}));}
setInterval(()=>{document.querySelectorAll('.order-time[data-ts]').forEach(el=>{el.textContent=timeLabel(Number(el.dataset.ts));});},10000);

/* ── WebSocket ── */
let ws, reconnectDelay=1000;
function connect(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}`);
  ws.onopen=()=>{
    reconnectDelay=1000; connDot.className='conn-dot ok';
    ws.send(JSON.stringify({type:'register',role:'service'}));
    ws.send(JSON.stringify({type:'update_config',config}));
  };
  ws.onmessage=({data})=>{
    let msg;try{msg=JSON.parse(data);}catch{return;}
    if(msg.type==='orders'){msg.orders.forEach(addOrder);return;}
    if(msg.type==='new_order'){addOrder(msg.order);playBeep();sendNotif(msg.order);return;}
    if(msg.type==='order_removed'){removeOrder(msg.orderId);}
  };
  ws.onclose=()=>{connDot.className='conn-dot err';setTimeout(connect,reconnectDelay);reconnectDelay=Math.min(reconnectDelay*2,30000);};
  ws.onerror=()=>ws.close();
}

checkNotif();
connect();
</script>
</body>
</html>
